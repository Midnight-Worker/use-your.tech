<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP Demo</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #10131a;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .stage {
      text-align: center;
    }

    .title {
      font-size: 42px;
      margin-bottom: 30px;
      opacity: 0;
      transform: translateY(-30px);
    }

    .row {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .card {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: bold;
      color: white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      transform: translateY(80px) scale(0.6);
      opacity: 0;
    }

    .c1 { background: #ff6b6b; }
    .c2 { background: #4ecdc4; }
    .c3 { background: #ffe66d; color: #222; }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="title">GSAP Mini Demo</div>

    <div class="row">
      <div class="card c1">1</div>
      <div class="card c2">2</div>
      <div class="card c3">3</div>
    </div>

    <button class="btn" id="replayBtn">Nochmal abfeuern</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ defaults: { duration: 0.8, ease: "back.out(1.7)" } });

    tl.to(".title", {
      opacity: 1,
      y: 0,
      duration: 0.8
    })
    .to(".c1", { opacity: 1, y: 0, scale: 1, rotate: -8 }, "-=0.2")
    .to(".c2", { opacity: 1, y: 0, scale: 1, rotate: 0 }, "-=0.5")
    .to(".c3", { opacity: 1, y: 0, scale: 1, rotate: 8 }, "-=0.5")
    .to(".card", {
      y: -10,
      repeat: 1,
      yoyo: true,
      stagger: 0.08,
      duration: 0.22
    });

    document.getElementById("replayBtn").addEventListener("click", () => {
      tl.restart();
    });
  </script>
</body>
</html>
